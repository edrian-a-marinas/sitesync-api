name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    if: github.event_name == 'pull_request' # remove this after finish backend / fully working for safety net
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: apmed
          POSTGRES_PASSWORD: edrian
          POSTGRES_DB: sitesync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://apmed:edrian@localhost/sitesync_test
          TEST_DATABASE_URL: postgresql+asyncpg://apmed:edrian@localhost/sitesync_test
          SECRET_KEY: test-secret-key
          GROQ_API_KEY: test-groq-key
          REDIS_URL: redis://localhost:6379/0
          REDIS_CACHE_URL: redis://localhost:6379/1
          DEBUG: "true"
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        run: pytest --tb=short -q
  deploy:
    # needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/sitesync-api
            git pull origin main
            docker compose up -d --build