services:
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL}
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    restart: always
    command: celery -A app.core.celery:celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL}
    depends_on:
      redis:
        condition: service_healthy
  celery_beat:
    build: .
    restart: always
    command: celery -A app.core.celery:celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL}
    depends_on:
      redis:
        condition: service_healthy